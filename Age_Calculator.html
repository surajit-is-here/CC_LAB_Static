<!DOCTYPE html>
<html>
<head>
    <title>Date and Time and Age</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #4facfe;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }

        p {
            margin-top: 15px;
            font-size: 14px;
        }

        #age {
            font-weight: bold;
            color: #333;
        }

        #date {
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Age Calculator</h2>

    <input type="text" id="day" placeholder="Day">
    <input type="text" id="month" placeholder="Month">
    <input type="text" id="year" placeholder="Year">

    <button onclick="age()">Calculate</button>

    <p>Current date and time:<br> <span id="date"></span></p>
    <p><span id="age"></span></p>
</div>

<script>
    var dt = new Date();
    document.getElementById('date').innerHTML = dt;

    function age() {
        var d1 = document.getElementById("day").value;
        var m1 = document.getElementById("month").value;
        var y1 = document.getElementById("year").value;

        var date = new Date();
        var d2 = date.getDate();
        var m2 = 1 + date.getMonth();
        var y2 = date.getFullYear();

        var month = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

        if (d1 > d2) {
            d2 = d2 + month[m2 - 1];
            m2 = m2 - 1;
        }

        if (m1 > m2) {
            m2 = m2 + 12;
            y2 = y2 - 1;
        }

        var d = d2 - d1;
        var m = m2 - m1;
        var y = y2 - y1;

        document.getElementById("age").innerHTML =
            "Your Age is " + y + " Years " + m + " Months " + d + " Days";
    }
</script>

</body>
</html>
